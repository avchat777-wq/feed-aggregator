services:
  db:
    image: postgres:16-alpine
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedagg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedagg_pass}
      POSTGRES_DB: ${POSTGRES_DB:-feed_aggregator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedagg} -d ${POSTGRES_DB:-feed_aggregator}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - feed_output:/app/static/feed
      - feed_cache:/app/cache
      - app_data:/app/data
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - feed_output:/usr/share/nginx/html/feed:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  feed_output:
  feed_cache:
  app_data:
