version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedagg
      POSTGRES_PASSWORD: feedagg_pass
      POSTGRES_DB: feed_aggregator
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedagg -d feed_aggregator"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - feed_output:/app/static/feed
      - feed_cache:/app/cache        # raw feed cache (fallback on source errors)
      - ./app:/app/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - feed_output:/usr/share/nginx/html/feed:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  feed_output:
  feed_cache:
